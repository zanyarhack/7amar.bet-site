<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7AMAR VIP - بەخێربێیت</title>
    <style>
        body {
            background: #0a0f1a;
            color: #e5e9f0;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: #1a2635;
            padding: 40px 20px;
            border-radius: 60px;
            border: 2px solid #d4af37;
            box-shadow: 0 0 40px #d4af3740;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: #d4af37;
            font-size: 42px;
            margin-bottom: 20px;
        }
        p {
            font-size: 22px;
            margin: 20px 0;
            line-height: 1.6;
        }
        .gold {
            color: #f5c84e;
            font-weight: bold;
        }
        .btn {
            background: #d4af37;
            color: #0a0f1a;
            border: none;
            padding: 15px 30px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👑 7AMAR VIP</h1>
        <p>بەخێربێیت ئەی پاشا</p>
        <p class="gold">✅ سایتەکە بە سەرکەوتوویی کار دەکات</p>
        <p>✨ ئێستا دەتوانیت پارە داخڵ بکەیت ✨</p>
        <a href="#" class="btn">داخڵکردنی پارە</a>
    </div>
</body>
</html>
